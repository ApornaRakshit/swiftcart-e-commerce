<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title -->
    <title>E-Commerce Application Design</title>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind & daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="style/style.css">
</head>

<body class="overflow-x-hidden">

    <!-- Navbar Section -->
    <div class="navbar bg-base-100 shadow-sm">
        <div class="max-w-7xl mx-auto w-full px-6 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="dropdown lg:hidden">
                    <div tabindex="0" role="button" class="btn btn-ghost">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box mt-3 w-52 p-2 shadow">
                        <li><a href="index.html" class="hover:text-violet-600">Home</a></li>
                        <li><a href="products.html" class="hover:text-violet-600">Products</a></li>
                        <li><a class="hover:text-violet-600">About</a></li>
                        <li><a class="hover:text-violet-600">Contact</a></li>
                    </ul>
                </div>
                <a class="text-xl font-semibold text-violet-700">
                    SwiftCart
                </a>
            </div>
            <div class="hidden lg:flex">
                <ul class="menu-horizontal gap-6 font-medium">
                    <li><a href="index.html" class="hover:text-violet-600 ">Home</a></li>
                    <li><a href="products.html" class="hover:text-violet-600 transition duration-200">Products</a></li>
                    <li><a class="hover:text-violet-600 transition duration-200">About</a></li>
                    <li><a class="hover:text-violet-600 transition duration-200">Contact</a></li>
                </ul>
            </div>
            <div>
                <a class="text-xl">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
            </div>
        </div>
    </div>

    <section class="max-w-6xl mx-auto px-4">
        <div class="text-center my-8 font-bold">
            <h2 class="text-3xl md:text-4xl">Our Products</h2>
        </div>
        <div id="level-container" class="flex flex-wrap justify-center gap-3 md:gap-5">
        </div>
    </section>

    <!-- <div id="level-container" class="flex flex-wrap gap-3 justify-center my-6"></div> -->

    <section>
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 px-6 w-10/12 mx-auto my-10">
        </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
  <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
  <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box" id="modal-content">
      <h3 class="text-lg font-bold">Hello!</h3>
      <p class="py-4">Press ESC key or click the button below to close</p>
      <div class="modal-action">
        <form method="dialog">
          <!-- if there is a button in form, it will close the modal -->
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>

    <!-- JS -->
    <script src="index.js"></script>
</body>

</html>
